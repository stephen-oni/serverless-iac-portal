<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-card">
        <h1>TESTING</h1>
        <p>Register here below</p>
        
        <form id="registrationForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">register</button>
        </form>
        
        <div id="responseMessage" style="margin-top: 15px; font-weight: bold; font-size: 0.9em; min-height: 20px;"></div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const responseDiv = document.getElementById('responseMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. Show loading state
            responseDiv.innerText = "Connecting to AWS Lambda...";
            responseDiv.style.color = "white";

            // 2. Gather data from the form
            const data = {
                name: document.getElementById('name').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                // 3. Send to API Gateway (REPLACE THIS URL AFTER YOU DEPLOY!)
                const response = await fetch('YOUR API LINK SHOULD BE HERE', {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                // 4. Read the Python response
                const result = await response.json();

                if (response.ok) {
                    // Success! Show green text and clear the form.
                    responseDiv.innerText = result.message;
                    responseDiv.style.color = "#00FF00"; 
                    form.reset(); 
                } else {
                    // Python caught an error (like Duplicate Username). Show red text!
                    responseDiv.innerText = result.error;
                    responseDiv.style.color = "#FF4444"; 
                }
            } catch (error) {
                responseDiv.innerText = "Network Error. Could not connect to AWS.";
                responseDiv.style.color = "#FF4444";
            }
        });
    </script>
</body>
</html>
